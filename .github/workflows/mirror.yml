name: Mirror to Professional GitHub

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror
        env:
          PROFESSIONAL_TOKEN: ${{ secrets.PROFESSIONAL_GITHUB_TOKEN }}
        run: |
          git config --global --unset-all credential.helper || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git push https://x-access-token:${PROFESSIONAL_TOKEN}@github.com/silverreyes/GB-Golf-Optimizer.git --mirror